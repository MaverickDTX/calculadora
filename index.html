<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="color-scheme" content="dark light" />
    <meta name="theme-color" content="#0E0E0F" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#F7F4EE" media="(prefers-color-scheme: light)" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kelly Stake Pro</title>
    <meta name="description" content="Calculadora de apostas esportivas: quanto apostar, não em que apostar." />
    <script>
      (function () {
        try {
          var t = localStorage.getItem('ks-theme');
          if (t === 'ivory') document.documentElement.setAttribute('data-theme', 'ivory');
        } catch (e) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@400;500;600&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  </head>
  <body>
    <a href="#main" class="skip-link">Ir para o conteúdo</a>
    <div id="loading" style="display:flex;align-items:center;justify-content:center;height:100vh;background:#0E0E0F;position:fixed;top:0;left:0;right:0;bottom:0;z-index:9999;">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#4CBF95" stroke-width="2" stroke-linecap="round" style="animation:spin 1s linear infinite;">
        <circle cx="12" cy="12" r="10" stroke-opacity="0.25"/>
        <path d="M12 2a10 10 0 0 1 10 10"/>
      </svg>
      <style>
        @keyframes spin {
          0% { transform: rotate(0deg); }
          100% { transform: rotate(360deg); }
        }
      </style>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      window.addEventListener('load', function() {
        var loading = document.getElementById('loading');
        if (loading) loading.style.display = 'none';
      });
    </script>
  </body>
</html>
